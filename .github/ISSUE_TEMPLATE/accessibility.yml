name: Accessibility
description: Report an accessibility issue
labels: ["type:accessibility"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us make this project more accessible!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the accessibility barrier.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform does this affect?
      options:
        - Website
        - Backend
        - Frontend
        - API
        - Mobile
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How difficult do you think this is to fix?
      options:
        - Beginner
        - Intermediate
        - Advanced
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this issue?
      options:
        - Low
        - Medium
        - High
        - Critical
  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Any other context about the problem here.
